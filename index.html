<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Chat | Live Gruppenchat</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root {
            --wa-bg: #0b141a;
            --wa-panel: #202c33;
            --wa-incoming: #202c33;
            --wa-outgoing: #005c4b;
            --wa-text: #e9edef;
            --accent-cyan: #00f0ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0c0c12;
            background-image: linear-gradient(135deg, #0c0c12 0%, #1a1a2e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--wa-text);
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background-color: var(--wa-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* CHAT KOPF */
        .chat-header {
            background-color: var(--wa-panel);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.2);
        }

        .chat-header .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, #00f0ff, #ff007f);
            border-radius: 50%;
            margin-right: 15px;
        }

        .chat-header .info h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-header .info p {
            font-size: 12px;
            color: #8696a0;
        }

        /* NACHRICHTEN BEREICH */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* WhatsApp Wallpaper */
            background-blend-mode: overlay;
            background-color: rgba(11, 20, 26, 0.95);
        }

        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14.5px;
            position: relative;
            line-height: 1.4;
            word-break: break-word;
        }

        .message .sender {
            font-size: 11px;
            font-weight: bold;
            color: var(--accent-cyan);
            margin-bottom: 3px;
            display: block;
        }

        .incoming {
            background-color: var(--wa-incoming);
            align-self: flex-start;
            border-top-left-radius: 0;
        }

        .outgoing {
            background-color: var(--wa-outgoing);
            align-self: flex-end;
            border-top-right-radius: 0;
        }

        .message .time {
            font-size: 10px;
            color: #8696a0;
            float: right;
            margin-top: 5px;
            margin-left: 10px;
        }

        /* EINGABEBEREICH */
        .chat-input-area {
            background-color: var(--wa-panel);
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            background-color: #2a3942;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--wa-text);
            font-size: 15px;
            outline: none;
        }

        .chat-input-area input::placeholder {
            color: #8696a0;
        }

        .chat-input-area button {
            background-color: #00a884;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        .chat-input-area button:hover {
            background-color: #008f72;
            transform: scale(1.05);
        }

        /* NICKNAME OVERLAY */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .login-box {
            background: #161626;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--accent-cyan);
            max-width: 320px;
            width: 90%;
        }
        .login-box h3 { margin-bottom: 15px; }
        .login-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #252538;
            color: white;
            text-align: center;
            outline: none;
        }
        .login-box button {
            background: var(--accent-cyan);
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="overlay" id="login-overlay">
        <div class="login-box">
            <h3>Wie heißt du?</h3>
            <input type="text" id="username-input" placeholder="Dein Chat-Name..." maxlength="15">
            <button onclick="joinChat()">Chat beitreten</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar"></div>
            <div class="info">
                <h2>Globale Arena-Gruppe</h2>
                <p id="status-text">Verbinde zum Server...</p>
            </div>
        </div>

        <div class="chat-messages" id="chat-box">
            </div>

        <div class="chat-input-area">
            <input type="text" id="msg-input" placeholder="Nachricht schreiben..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMsg()">></button>
        </div>
    </div>

    <script>
        let username = "Anonym";
        const chatBox = document.getElementById("chat-box");
        const msgInput = document.getElementById("msg-input");
        const statusText = document.getElementById("status-text");

        // Wir nutzen einen API-Schlüssel für einen Echtzeit-Kanal.
        // Hinweis: Da das Skript clientseitig läuft, ist dieser API-Key öffentlich sichtbar. Für Testprojekte ist das perfekt!
        const ably = new Ably.Realtime('h3Z6wA.3eY9Bg:-_g7-0Xo7gIe-7_P3l9p_Kq9_WjJ-oX8-7_P3l9p_Kq');
        const channel = ably.channels.get('global-brawl-chat');

        ably.connection.on('connected', () => {
            statusText.innerText = "Online";
            statusText.style.color = "#00a884";
        });

        ably.connection.on('disconnected', () => {
            statusText.innerText = "Offline (Verbindung verloren)";
            statusText.style.color = "#ff3232";
        });

        // Abonnieren: Wenn eine neue Nachricht auf dem Server reinkommt
        channel.subscribe('message', (message) => {
            const data = message.data;
            const isMe = data.sender === username;
            addMessageToUI(data.sender, data.text, data.time, isMe);
        });

        function joinChat() {
            const input = document.getElementById("username-input").value.trim();
            if(input.length > 0) {
                username = input;
                document.getElementById("login-overlay").style.display = "none";
                
                // Willkommensnachricht lokal anzeigen
                addMessageToUI("System", `Willkommen im Chat, ${username}!`, new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), false);
            }
        }

        function sendMsg() {
            const text = msgInput.value.trim();
            if(text.length === 0) return;

            const timeNow = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            // Nachricht an das weltweite Echtzeit-Netzwerk senden
            channel.publish('message', {
                sender: username,
                text: text,
                time: timeNow
            });

            msgInput.value = "";
        }

        function handleKeyPress(e) {
            if(e.key === "Enter") {
                sendMsg();
            }
        }

        function addMessageToUI(sender, text, time, isMe) {
            const msgDiv = document.createElement("div");
            msgDiv.classList.add("message");
            
            if(sender === "System") {
                msgDiv.classList.add("incoming");
                msgDiv.style.background = "#161626";
                msgDiv.style.alignSelf = "center";
                msgDiv.style.borderTopLeftRadius = "8px";
                msgDiv.innerHTML = `<span style='color: #00f0ff; font-size:12px;'>${text}</span>`;
            } else {
                msgDiv.classList.add(isMe ? "outgoing" : "incoming");
                
                let senderSpan = isMe ? "" : `<span class="sender">${sender}</span>`;
                msgDiv.innerHTML = `
                    ${senderSpan}
                    <span class="text">${text}</span>
                    <span class="time">${time}</span>
                `;
            }

            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight; // Automatisch nach unten scrollen
        }
    </script>
</body>
</html>
